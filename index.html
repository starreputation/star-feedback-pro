<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Feedback Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>⭐ Star Feedback</h2>
<p>Tap a star to rate your experience</p>

<div class="stars">
<span data-rate="1">★</span>
<span data-rate="2">★</span>
<span data-rate="3">★</span>
<span data-rate="4">★</span>
<span data-rate="5">★</span>
</div>

<div id="goodReviews">
<p>Tap to copy & post on Google ⭐</p>

<div class="review-box">Amazing service and friendly staff</div>
<div class="review-box">Highly recommended travel service</div>
<div class="review-box">Best travel agency experience</div>
<div class="review-box">Affordable and reliable service</div>
<div class="review-box">Very professional team</div>

</div>

<form id="feedbackForm">
<input type="tel" placeholder="Mobile Number" required>
<input type="email" placeholder="Email Address" required>
<textarea placeholder="Tell us what went wrong"></textarea>
<button type="submit">Submit Feedback</button>
</form>

</div>

<script src="script.js"></script>

</body>
</html>
